<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JCD Invoice Generator</title>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
–bg: #0e0e10;
–surface: #18181b;
–border: #2a2a2f;
–accent: #8b3a3a;
–accent2: #c45c5c;
–text: #f0ede8;
–muted: #7a7a85;
–input-bg: #111114;
–success: #4caf82;
}

body {
font-family: ‘DM Sans’, sans-serif;
background: var(–bg);
color: var(–text);
min-height: 100vh;
padding: 0;
}

.app-shell {
max-width: 480px;
margin: 0 auto;
padding: 0 0 80px 0;
min-height: 100vh;
}

.header {
background: var(–surface);
border-bottom: 1px solid var(–border);
padding: 20px 24px 16px;
position: sticky;
top: 0;
z-index: 10;
display: flex;
align-items: center;
gap: 14px;
}

.header-logo {
width: 40px;
height: 40px;
background: var(–accent);
border-radius: 10px;
display: flex;
align-items: center;
justify-content: center;
font-family: ‘DM Serif Display’, serif;
font-size: 15px;
color: white;
letter-spacing: 1px;
flex-shrink: 0;
}

.header-text h1 {
font-family: ‘DM Serif Display’, serif;
font-size: 18px;
color: var(–text);
letter-spacing: 0.3px;
}

.header-text p {
font-size: 12px;
color: var(–muted);
margin-top: 1px;
}

.content { padding: 24px 20px; }

.section {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 16px;
padding: 20px;
margin-bottom: 16px;
}

.section-title {
font-size: 11px;
font-weight: 600;
letter-spacing: 1.2px;
text-transform: uppercase;
color: var(–accent2);
margin-bottom: 16px;
}

.field {
margin-bottom: 14px;
}

.field:last-child { margin-bottom: 0; }

label {
display: block;
font-size: 12px;
color: var(–muted);
font-weight: 500;
margin-bottom: 6px;
letter-spacing: 0.2px;
}

input, select {
width: 100%;
background: var(–input-bg);
border: 1px solid var(–border);
border-radius: 10px;
padding: 12px 14px;
color: var(–text);
font-family: ‘DM Sans’, sans-serif;
font-size: 15px;
outline: none;
transition: border-color 0.2s;
-webkit-appearance: none;
}

input:focus, select:focus {
border-color: var(–accent2);
}

input::placeholder { color: var(–muted); opacity: 0.6; }

.row-2 {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 10px;
}

/* Timesheet table */
.ts-header {
display: grid;
grid-template-columns: 70px 1fr 60px;
gap: 8px;
padding: 0 0 8px 0;
border-bottom: 1px solid var(–border);
margin-bottom: 10px;
}

.ts-header span {
font-size: 11px;
font-weight: 600;
letter-spacing: 0.8px;
text-transform: uppercase;
color: var(–muted);
}

.ts-row {
display: grid;
grid-template-columns: 70px 1fr 60px;
gap: 8px;
margin-bottom: 8px;
align-items: center;
}

.ts-row input {
padding: 9px 10px;
font-size: 14px;
}

.ts-row .date-cell {
font-size: 13px;
color: var(–muted);
padding: 9px 0;
}

.add-row-btn {
width: 100%;
padding: 10px;
background: transparent;
border: 1px dashed var(–border);
border-radius: 10px;
color: var(–muted);
font-size: 13px;
cursor: pointer;
margin-top: 8px;
font-family: ‘DM Sans’, sans-serif;
transition: all 0.2s;
}

.add-row-btn:hover {
border-color: var(–accent2);
color: var(–accent2);
}

.remove-btn {
width: 24px;
height: 24px;
border-radius: 6px;
background: transparent;
border: 1px solid var(–border);
color: var(–muted);
font-size: 16px;
cursor: pointer;
display: flex;
align-items: center;
justify-content: center;
flex-shrink: 0;
line-height: 1;
font-family: ‘DM Sans’, sans-serif;
}

.remove-btn:hover { background: #3a1414; border-color: #c45c5c; color: #c45c5c; }

/* Summary */
.summary-line {
display: flex;
justify-content: space-between;
align-items: center;
padding: 10px 0;
border-bottom: 1px solid var(–border);
font-size: 14px;
}

.summary-line:last-child { border-bottom: none; }
.summary-line.total { font-weight: 600; font-size: 16px; color: var(–success); }
.summary-line span:first-child { color: var(–muted); }
.summary-line.total span:first-child { color: var(–text); }

/* Generate button */
.generate-btn {
width: calc(100% - 40px);
position: fixed;
bottom: 20px;
left: 50%;
transform: translateX(-50%);
max-width: 440px;
padding: 16px;
background: var(–accent);
color: white;
border: none;
border-radius: 14px;
font-size: 16px;
font-weight: 600;
font-family: ‘DM Sans’, sans-serif;
cursor: pointer;
transition: all 0.2s;
display: flex;
align-items: center;
justify-content: center;
gap: 10px;
box-shadow: 0 4px 24px rgba(139,58,58,0.4);
z-index: 100;
}

.generate-btn:hover { background: var(–accent2); transform: translateX(-50%) translateY(-1px); }
.generate-btn:active { transform: translateX(-50%) translateY(0); }

.total-hours-badge {
background: var(–accent);
color: white;
padding: 3px 10px;
border-radius: 20px;
font-size: 13px;
font-weight: 600;
}

.ts-row-wrap {
display: grid;
grid-template-columns: 70px 1fr 50px 28px;
gap: 8px;
margin-bottom: 8px;
align-items: center;
}

.ts-header-4 {
display: grid;
grid-template-columns: 70px 1fr 50px 28px;
gap: 8px;
padding-bottom: 8px;
border-bottom: 1px solid var(–border);
margin-bottom: 10px;
}

.ts-header-4 span {
font-size: 11px;
font-weight: 600;
letter-spacing: 0.8px;
text-transform: uppercase;
color: var(–muted);
}

.toast {
position: fixed;
bottom: 90px;
left: 50%;
transform: translateX(-50%);
background: var(–success);
color: #0e1a12;
padding: 12px 24px;
border-radius: 30px;
font-weight: 600;
font-size: 14px;
opacity: 0;
transition: opacity 0.3s;
pointer-events: none;
z-index: 200;
}

.toast.show { opacity: 1; }
</style>

</head>

<script>
// ---- State ----
let rows = [];

function addRow(date='', site='', hours='') {
  const id = Date.now() + Math.random();
  rows.push({ id, date, site, hours });
  renderRows();
}

function removeRow(id) {
  rows = rows.filter(r => r.id !== id);
  renderRows();
}

function updateRow(id, field, val) {
  const r = rows.find(r => r.id === id);
  if (r) r[field] = val;
  updateTotalHours();
}

function renderRows() {
  const container = document.getElementById('timesheetRows');
  container.innerHTML = '';
  rows.forEach(row => {
    const div = document.createElement('div');
    div.className = 'ts-row-wrap';
    div.innerHTML = `
      <input type="date" value="${row.date}" onchange="updateRow(${row.id},'date',this.value)">
      <input type="text" placeholder="Site name" value="${row.site}" oninput="updateRow(${row.id},'site',this.value)">
      <input type="number" placeholder="hrs" value="${row.hours}" oninput="updateRow(${row.id},'hours',this.value)">
      <button class="remove-btn" onclick="removeRow(${row.id})">×</button>
    `;
    container.appendChild(div);
  });
  updateTotalHours();
}

function updateTotalHours() {
  const total = rows.reduce((s, r) => s + (parseFloat(r.hours) || 0), 0);
  document.getElementById('totalHoursBadge').textContent = total + ' hrs';
}

function validateDOB(input) {
  const error = document.getElementById('dob-error');
  if (input.value && input.value > '2008-12-31') {
    input.value = '';
    error.style.display = 'block';
  } else {
    error.style.display = 'none';
  }
}


function autoCalcDeduction() {
  const gross = parseFloat(document.getElementById('grossPaid').value) || 0;
  const mat = parseFloat(document.getElementById('materials').value) || 0;
  const auto = Math.round((gross - mat) * 0.20);
  document.getElementById('deduction').value = auto > 0 ? auto : '';
  updateSummary();
}

function updateSummary() {
  const gross = parseFloat(document.getElementById('grossPaid').value) || 0;
  const mat = parseFloat(document.getElementById('materials').value) || 0;
  const ded = parseFloat(document.getElementById('deduction').value) || 0;
  const net = gross - mat - ded;
  document.getElementById('s-gross').textContent = '£' + gross.toFixed(0);
  document.getElementById('s-mat').textContent = '£' + mat.toFixed(0);
  document.getElementById('s-ded').textContent = '£' + ded.toFixed(0);
  document.getElementById('s-net').textContent = '£' + Math.max(0, net).toFixed(0);
}

// Pre-fill today's date
document.getElementById('paymentDate').valueAsDate = new Date();

// Start with one empty row
addRow();

updateSummary();

  doc.setTextColor(150, 150, 150);
  doc.text('CIS Subcontractor Invoice — ' + get('name'), W / 2, y + 12, { align: 'center' });

  const filename = `Invoice_${(get('name') || 'Subcontractor').replace(/ /g,'_')}_${formatDisplayDate(get('paymentDate')).replace(/\//g,'-')}.pdf`;
  doc.save(filename);

  // Toast
  const toast = document.getElementById('toast');
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

function get(id) {
  return (document.getElementById(id)?.value || '').trim();
}

function formatDisplayDate(iso) {
  if (!iso) return '';
  const parts = iso.split('-');
  if (parts.length !== 3) return iso;
  return `${parts[2]}/${parts[1]}/${parts[0]}`;
}
</script>
